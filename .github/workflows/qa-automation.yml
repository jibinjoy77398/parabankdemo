name: QA CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Permissions needed for deploying to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test-and-report:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Automation Tests
        run: npx playwright test --reporter=list,junit,html
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: results.xml

      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload JUnit Results (XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: results.xml

      - name: Upload Executive Summary (Pictorial)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-pictorial-report
          path: reports/

      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

  deploy:
    if: always()
    needs: test-and-report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4